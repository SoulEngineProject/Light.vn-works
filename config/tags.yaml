colours:
  content: "#dc2626"
  ai: "#2563eb"
  contest: "#a16207"
  publisher: "#0891b2"
  language: "#15803d"

tags:
  # Content warnings
  - colour: content
    tags: [r18]

  # AI-generated content (rendered in its own dedicated top-left slot —
  # never promoted into the right-slot priority cascade)
  - colour: ai
    tags: [ai]
    card_priority_badge: false

  # Contests / events
  - colour: contest
    tags: [らいとゔぃえん祭]
    url: "https://matsuri.lvnstory.com/{year}"
    label: "{tag}{year} 参加作品"

  - colour: contest
    tags: [Spooktober]
    url: "https://itch.io/jam/spooktober-{year}"
    label: "{tag} {year} Entry"

  - colour: contest
    tags: [Summer Jam, ノアフェス]

  # Publishers
  - colour: publisher
    tags: [Terrace and Ray]
  - colour: publisher
    tags: [Light.vn X]

  - colour: language
    tags: [UI]

  # Languages (filter-only; not eligible for the right-slot priority badge —
  # languages are metadata, not card identity)
  - colour: language
    tags: [English, 한국어, 中文]
    card_priority_badge: false
