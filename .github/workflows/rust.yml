name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    # All cargo steps below use --locked so CI fails (rather than silently
    # re-resolving) if Cargo.toml drifts from Cargo.lock — the safety net
    # that makes committing the lockfile load-bearing.
    # -D warnings: any clippy warning fails CI. Strict on purpose — keeps the
    # warning count at zero so new ones can't slip in unnoticed.
    - name: Clippy
      run: cargo clippy --locked --all-targets -- -D warnings
    # Checks Cargo.lock against the RustSec advisory database. Different DB
    # from Dependabot alerts — they overlap but neither is a superset, so
    # both running together gives wider coverage. Add false-positive ignores
    # to .cargo/audit.toml when a finding is genuine but unfixable.
    - name: Security audit
      uses: rustsec/audit-check@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Run tests
      run: cargo test --locked --verbose
    - name: Install tarpaulin
      run: cargo install cargo-tarpaulin
    - name: Coverage
      run: cargo tarpaulin --locked --skip-clean
