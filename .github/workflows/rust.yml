name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    # - Cache the cargo registry + target/ across runs so unchanged deps aren't recompiled.
    # - Cold cache (first run, or a Cargo.lock/toolchain change) still rebuilds fully.
    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2
    # Fails CI if any file isn't rustfmt-formatted. Run `cargo fmt` to fix.
    - name: Format check
      run: cargo fmt --check
    # All cargo steps below use --locked so CI fails (rather than silently
    # re-resolving) if Cargo.toml drifts from Cargo.lock — the safety net
    # that makes committing the lockfile load-bearing.
    # -D warnings: any clippy warning fails CI. Strict on purpose — keeps the
    # warning count at zero so new ones can't slip in unnoticed.
    - name: Clippy
      run: cargo clippy --locked --all-targets -- -D warnings
    # Checks Cargo.lock against the RustSec advisory database. Different DB
    # from Dependabot alerts — they overlap but neither is a superset, so
    # both running together gives wider coverage. Add false-positive ignores
    # to .cargo/audit.toml when a finding is genuine but unfixable.
    - name: Security audit
      uses: rustsec/audit-check@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Run tests
      run: cargo test --locked --verbose
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: JS tests
      run: node --test
      working-directory: tests/js
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    # - Cross-platform coverage (Linux/Windows/macOS), so local numbers match CI.
    # - Gate: fail the build if line coverage drops below the floor; ratchet upward over time.
    - name: Coverage
      run: cargo llvm-cov --locked --summary-only --fail-under-lines 74
