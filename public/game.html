<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{title_display}} ({{year}}) - Light.vn Works</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/lvn_icon.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/game.css">
    <meta property="og:title" content="{{title_display}} - Light.vn Works" />
    <meta property="og:description" content="{{tagline}}" />
    <meta property="og:image" content="{{og_image}}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
</head>
<body>
    <button class="lang-toggle" id="lang-toggle"></button>
    <script>
    (function() {
        var p = new URLSearchParams(location.search).get('lang');
        var lang = p === 'ja' || p === 'en' ? p : '{{i18n_detected_lang}}';
        var btn = document.getElementById('lang-toggle');
        btn.textContent = lang === 'ja' ? 'English' : '\u65E5\u672C\u8A9E';
        btn.addEventListener('click', function() {
            var url = new URL(location.href);
            url.searchParams.set('lang', lang === 'ja' ? 'en' : 'ja');
            location.href = url.toString();
        });
    })();
    </script>
    <nav class="breadcrumb">
        <a href="/{{lang_suffix}}">{{i18n_breadcrumb_works}}</a>
        <span>/</span>
        <a href="/{{lang_suffix}}#{{year}}">{{year}}</a>
        <span>/</span>
        {{title_display}}
    </nav>
    {{hero_html}}
    <div class="content">
        <h1>{{title_display}}</h1>
        <div class="meta-row">
            {{creator_html}}
            {{released_html}}
            {{link_html}}
            {{extra_links_html}}
            <button class="share-btn" data-share="{{i18n_share}}" data-copied="{{i18n_copied}}" onclick="copyLink(this)">{{i18n_share}}</button>
        </div>
        {{tags_line}}
    <script>
    function copyLink(btn) {
        navigator.clipboard.writeText(window.location.href);
        btn.textContent = btn.dataset.copied;
        setTimeout(function() { btn.textContent = btn.dataset.share; }, 1500);
    }
    </script>
        <div class="synopsis">{{synopsis_html}}</div>
        {{gallery_html}}
        {{more_from_creator}}
    </div>
    <footer class="game-footer">
        {{i18n_footer}}
    </footer>
    <script data-goatcounter="https://lightvn-works.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
