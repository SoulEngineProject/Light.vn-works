<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Light.vn Works</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0b12;
      --surface: #16131e;
      --card: #1a1726;
      --card-hover: #221e30;
      --text: #ede9fe;
      --text-muted: #a8a2c6;
      --accent: #c084fc;
      --accent-glow: rgba(192, 132, 252, 0.2);
      --accent-hover: #d8b4fe;
      --border: #2a2440;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e9d5ff, #c084fc, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Search */
    .search-wrap {
      max-width: 480px;
      margin: 0 auto 2.5rem;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    /* Year sections */
    details {
      margin-bottom: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow: hidden;
      transition: box-shadow 0.3s ease;
    }

    details[open] {
      box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.4);
    }

    summary {
      padding: 1.1rem 1.5rem;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s ease;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    summary::-webkit-details-marker { display: none; }
    summary:hover { background: rgba(255, 255, 255, 0.03); }

    summary::before {
      content: '\25B6';
      font-size: 0.8rem;
      color: var(--accent);
      transition: transform 0.3s ease;
      display: inline-block;
      flex-shrink: 0;
    }

    details[open] summary::before {
      transform: rotate(90deg);
    }

    .year-count {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Card grid */
    .files {
      padding: 0 1.25rem 1.25rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .file-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.875rem;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    .file-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.5),
                  0 0 0 1px var(--accent-glow);
      border-color: rgba(192, 132, 252, 0.3);
    }

    .card-thumb {
      position: relative;
      width: 100%;
      height: 150px;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .file-card:hover .card-thumb img {
      transform: scale(1.05);
    }

    .card-thumb::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(transparent, rgba(13, 11, 18, 0.6));
      pointer-events: none;
    }

    .card-body {
      padding: 0.875rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
      line-height: 1.4;
    }

    .card-creator {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .card-tagline {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: auto;
    }

    /* No-thumbnail fallback */
    .card-thumb-placeholder {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, var(--surface), var(--card));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2rem;
    }

    /* No results state */
    .no-results {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 0;
      font-size: 1.1rem;
    }

    /* Footer */
    footer {
      max-width: 960px;
      margin: 3rem auto 0;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.8;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { color: var(--accent-hover); }

    /* Loading */
    #tree:empty::before {
      content: "Loading works...";
      display: block;
      text-align: center;
      color: var(--text-muted);
      padding: 4rem 0;
      font-size: 1.1rem;
    }

    /* Responsive */
    @media (max-width: 640px) {
      h1 { font-size: 2rem; }
      .files {
        grid-template-columns: 1fr;
      }
      .card-thumb { height: 120px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Light.vn Works</h1>
      <p class="subtitle">Managed By: <span lang="ja">&#38634;&#21407;&#12383;&#12363;&#12375;</span> (Lightvn Japan Rep.) &bull; 2026</p>
    </header>

    <div class="search-wrap">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="search" placeholder="Search by title or creator..." autocomplete="off" />
    </div>

    <div id="tree"></div>
  </div>

  <footer>
    <div>Made with <a href="https://lightvn.net" target="_blank" rel="noopener">Light.vn</a></div>
    <div>Want to submit your game? Open a pull request on the repository.</div>
  </footer>

  <script>
    let allData = null;

    fetch('/api/tree')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load tree');
        return r.json();
      })
      .then(data => {
        allData = data;
        renderTree(data, '');
      })
      .catch(err => {
        document.getElementById('tree').innerHTML =
          '<p class="no-results">Error loading works: ' + err.message + '</p>';
      });

    // Search
    document.getElementById('search').addEventListener('input', function() {
      if (allData) renderTree(allData, this.value.trim().toLowerCase());
    });

    function renderTree(data, query) {
      const container = document.getElementById('tree');
      container.innerHTML = '';

      if (!data.children || data.children.length === 0) {
        container.innerHTML = '<p class="no-results">No works found yet.</p>';
        return;
      }

      const sortedYears = data.children
        .filter(y => y.is_dir && y.name.match(/^\d{4}$/))
        .sort((a, b) => b.name.localeCompare(a.name));

      let totalVisible = 0;

      sortedYears.forEach((year, index) => {
        const items = (year.children || []).filter(item => {
          if (item.is_dir) return false;
          if (!query) return true;

          const name = item.name.replace(/\.md$/i, '').toLowerCase();
          const creator = (item.meta && item.meta.creator) ? item.meta.creator.toLowerCase() : '';
          return name.includes(query) || creator.includes(query);
        });

        if (items.length === 0) return;
        totalVisible += items.length;

        const details = document.createElement('details');
        // Open first year by default, or all when searching
        if (index === 0 || query) {
          details.setAttribute('open', '');
        }

        const summary = document.createElement('summary');
        summary.innerHTML = year.name + ' <span class="year-count">(' + items.length + ')</span>';
        details.appendChild(summary);

        const filesDiv = document.createElement('div');
        filesDiv.className = 'files';

        items.forEach(item => {
          const displayName = item.name.replace(/\.md$/i, '').trim();
          let linkPath = item.path;
          if (linkPath.endsWith('.md')) linkPath = linkPath.slice(0, -3);

          const creator = (item.meta && item.meta.creator) ? item.meta.creator : '';
          const tagline = (item.meta && item.meta.tagline) ? item.meta.tagline : '';

          const a = document.createElement('a');
          a.href = linkPath;
          a.className = 'file-card';

          let thumbHtml;
          if (item.thumbnail) {
            thumbHtml = '<div class="card-thumb"><img src="' + item.thumbnail + '" alt="' +
              escapeHtml(displayName) + '" loading="lazy" /></div>';
          } else {
            thumbHtml = '<div class="card-thumb-placeholder">\u2728</div>';
          }

          a.innerHTML = thumbHtml +
            '<div class="card-body">' +
              '<div class="card-title">' + escapeHtml(displayName) + '</div>' +
              (creator ? '<div class="card-creator">by ' + escapeHtml(creator) + '</div>' : '') +
              (tagline ? '<div class="card-tagline">' + escapeHtml(tagline) + '</div>' : '') +
            '</div>';

          filesDiv.appendChild(a);
        });

        details.appendChild(filesDiv);
        container.appendChild(details);
      });

      if (totalVisible === 0 && query) {
        container.innerHTML = '<p class="no-results">No results for "' + escapeHtml(query) + '"</p>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
